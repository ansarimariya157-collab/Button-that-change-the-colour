<!DOCTYPE html>
<html>
<head>
<style>
h2{
background color: black;
}
#magicBtn {
    background-color: rgb(152, 178, 211);
    color: rgb(165, 59, 59);
    padding: 12px 24px;
    font-size: 15px;
    border-radius: 2px;
    cursor: pointer;
    transition: background-color 1s ease , transform 0.3s ease;
}
#magicBtn:hover {
    background-color: rgb(210, 172, 172);
    transform: scale(1.15);
    color:rgb(156, 20, 20);
}
</style>
  <title>Css Animation</title>
</head>
<body>
<h2><center>Hover using CSS Animation</center></h2><br/><br/>
<center><button id="magicBtn">Hover & Click Me</button></center><br/>
<center><button id="magicBtn">Hover & Click Me</button></center><br/>
</body>
</html>
